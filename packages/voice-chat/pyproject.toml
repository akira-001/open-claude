[project]
name = "voice-chat"
version = "0.0.0"
description = "Whisper STT + Irodori TTS + co_view + meeting digest"
requires-python = ">=3.13"
dependencies = [
    # Web
    "fastapi>=0.135.3",
    "uvicorn>=0.42.0",
    "websockets>=16.0",
    "httpx>=0.28.1",
    "httpcore>=1.0.9",
    "python-multipart>=0.0.24",
    "starlette>=1.0.0",
    # Audio / ML
    "faster-whisper>=1.2.1",
    "speechbrain>=1.1.0",
    "soundfile>=0.13.1",
    "librosa>=0.11.0",
    "scipy>=1.17.1",
    "numpy>=1.26.4",
    "numba>=0.65.0",
    "llvmlite>=0.47.0",
    "scikit-learn>=1.8.0",
    "torch>=2.11.0",
    "torchaudio>=2.11.0",
    "tqdm>=4.67.3",
    "soxr>=1.0.0",
    "audioread>=3.1.0",
    "lazy-loader>=0.5",
    "pooch>=1.9.0",
    "joblib>=1.5.3",
    # ASR / NLP
    "funasr-onnx>=0.4.1",
    "kaldi-native-fbank>=1.22.3",
    "jiwer>=4.0.0",
    "sentencepiece>=0.2.1",
    "tokenizers>=0.22.2",
    "HyperPyYAML>=1.2.3",
    "webrtcvad>=2.0.10",
    "audioop-lts>=0.2.2",
    "standard-aifc>=3.13.0",
    "standard-chunk>=3.13.0",
    "standard-sunau>=3.13.0",
    "RapidFuzz>=3.14.5",
    # ONNX
    "onnx>=1.19.0",
    "onnxruntime>=1.24.4",
    "ctranslate2>=4.7.1",
    # HuggingFace
    "huggingface_hub>=1.9.0",
    "hf-xet>=1.4.3",
    "filelock>=3.25.2",
    "fsspec>=2026.3.0",
    # Torch / ML aux
    "sympy>=1.14.0",
    "mpmath>=1.3.0",
    "networkx>=3.6.1",
    "ml-dtypes>=0.4.1",
    "flatbuffers>=25.12.19",
    "protobuf>=7.34.1",
    "msgpack>=1.1.2",
    "threadpoolctl>=3.6.0",
    # Utilities
    "python-dotenv>=1.2.2",
    "pydantic>=2.12.5",
    "pydantic_core>=2.41.5",
    "anyio>=4.13.0",
    "click>=8.3.1",
    "typer>=0.24.1",
    "rich>=14.3.3",
    "emoji>=2.15.0",
    "markdown-it-py>=4.0.0",
    "Pygments>=2.20.0",
    "Jinja2>=3.1.6",
    "MarkupSafe>=3.0.3",
    "PyYAML>=6.0.3",
    "ruamel.yaml>=0.18.17",
    "requests>=2.33.1",
    "urllib3>=2.6.3",
    "certifi>=2026.2.25",
    "charset-normalizer>=3.4.7",
    "idna>=3.11",
    "packaging>=26.0",
    "platformdirs>=4.9.6",
    "av>=17.0.0",
    "cffi>=2.0.0",
    "pycparser>=3.0",
    "typing_extensions>=4.15.0",
    "annotated-types>=0.7.0",
    "decorator>=5.2.1",
    "h11==0.16.0",
    "shellingham>=1.5.4",
    "anthropic>=0.97.0",
    "openai>=2.33.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "pluggy>=1.6.0",
    "iniconfig>=2.3.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
