[cogmem]
logs_dir = "memory/logs"
contexts_dir = "memory/contexts"
db_path = "memory/vectors.db"

lang = "ja"
[cogmem.identity]
soul = "identity/soul.md"
user = "identity/user.md"

[cogmem.knowledge]
summary = "memory/knowledge/summary.md"
error_patterns = "memory/knowledge/error-patterns.md"

[cogmem.session]
recent_logs = 2
prefer_compact = true
token_budget = 6000

[cogmem.crystallization]
last_checkpoint = "2026-05-01"
checkpoint_count = 8
pattern_threshold = 3
error_threshold = 5
log_days_threshold = 10
checkpoint_interval_days = 21
[cogmem.skills]
auto_improve = "auto"  # "auto" | "ask" | "off"

[cogmem.metrics]
total_sessions = 50

[cogmem.scoring]
sim_weight = 0.7
arousal_weight = 0.3
base_half_life = 60.0
decay_floor = 0.3

[cogmem.behavior]
consecutive_failure_threshold = 2

[[cogmem.skill_triggers]]
pattern = "dashboard/templates/**"
skills = ["tdd-dashboard-dev"]

[[cogmem.skill_triggers]]
pattern = "dashboard/services/**"
skills = ["tdd-dashboard-dev"]

[[cogmem.skill_triggers]]
pattern = "dashboard/i18n.py"
skills = ["tdd-dashboard-dev"]

[[cogmem.skill_triggers]]
pattern = "cron-jobs.json"
skills = ["cron-automation"]

[cogmem.embedding]
provider = "ollama"
model = "zylonai/multilingual-e5-large"
url = "http://localhost:11434/api/embed"
timeout = 10

[updates]
last_check = "2026-05-01T12:03:29"
