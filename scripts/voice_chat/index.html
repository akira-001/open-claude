<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1a1a2e;
    color: #eee;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.5;
    font-size: 15px;
  }
  .msg.user {
    align-self: flex-end;
    background: #0f3460;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #16213e;
    border-bottom-left-radius: 4px;
  }
  .msg.status {
    align-self: center;
    background: none;
    color: #888;
    font-size: 13px;
    padding: 4px;
  }
  #controls {
    padding: 16px 20px;
    display: flex;
    justify-content: center;
    gap: 12px;
    align-items: center;
    background: #16213e;
    flex-wrap: wrap;
  }
  #talkBtn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid #e94560;
    background: transparent;
    color: #e94560;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    -webkit-user-select: none;
  }
  #talkBtn:hover { background: rgba(233, 69, 96, 0.1); }
  #talkBtn.recording {
    background: #e94560;
    color: #fff;
    animation: pulse 1s infinite;
  }
  #talkBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  .side-btn {
    background: none;
    border: 1px solid #555;
    color: #aaa;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }
  .side-btn.on { border-color: #0f3460; color: #7ec8e3; }
  .side-btn.proactive-on { border-color: #2ecc71; color: #2ecc71; }
  select {
    background: #0d1b2a;
    color: #aaa;
    border: 1px solid #555;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
  }
  select:focus { border-color: #0f3460; color: #7ec8e3; outline: none; }
  #voiceSelect { max-width: 160px; }
  #modelSelect { max-width: 200px; }
  #toolbar {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 10px 20px 0;
    background: #16213e;
    flex-wrap: wrap;
    align-items: center;
  }
  .toolbar-label {
    color: #666;
    font-size: 11px;
    margin-right: -6px;
  }
  .bot-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    background: #16213e;
    border-bottom: 1px solid #0d1b2a;
  }
  .bot-row .bot-name {
    color: #e94560;
    font-size: 13px;
    font-weight: bold;
    min-width: 32px;
  }
  .bot-row select {
    font-size: 12px;
    padding: 4px 8px;
  }
  .bot-row .bot-play {
    background: none;
    border: 1px solid #e94560;
    color: #e94560;
    padding: 4px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
  }
  .bot-row .bot-play:hover { background: rgba(233, 69, 96, 0.1); }
  .bot-row .bot-play:disabled { opacity: 0.4; }
  .side-btn.reply-on { border-color: #e94560; color: #e94560; }
  #talkBtn.reply-mode { border-color: #f39c12; color: #f39c12; }
  #talkBtn.reply-mode:hover { background: rgba(243, 156, 18, 0.1); }
  #talkBtn.reply-mode.recording { background: #f39c12; color: #fff; }
</style>
</head>
<body>

<div id="chat"></div>

<div id="toolbar">
  <span class="toolbar-label">Model</span>
  <select id="modelSelect"></select>
  <span class="toolbar-label">Voice</span>
  <select id="voiceSelect"></select>
  <span class="toolbar-label">Speed</span>
  <select id="speedSelect">
    <option value="0.8">0.8x</option>
    <option value="1.0">1.0x</option>
    <option value="1.2">1.2x</option>
    <option value="1.5">1.5x</option>
    <option value="2.0">2.0x</option>
  </select>
</div>
<div class="bot-row">
  <span class="bot-name">Mei</span>
  <select id="meiVoice" class="bot-voice-select"></select>
  <select id="meiSpeed">
    <option value="0.8">0.8x</option>
    <option value="1.0">1.0x</option>
    <option value="1.2">1.2x</option>
    <option value="1.5">1.5x</option>
    <option value="2.0">2.0x</option>
  </select>
  <button class="bot-play" onclick="playBotMessage('mei')">Play</button>
</div>
<div class="bot-row">
  <span class="bot-name">Eve</span>
  <select id="eveVoice" class="bot-voice-select"></select>
  <select id="eveSpeed">
    <option value="0.8">0.8x</option>
    <option value="1.0">1.0x</option>
    <option value="1.2">1.2x</option>
    <option value="1.5">1.5x</option>
    <option value="2.0">2.0x</option>
  </select>
  <button class="bot-play" onclick="playBotMessage('eve')">Play</button>
</div>
<div id="controls">
  <button id="stopBtn" class="side-btn" onclick="stopAudio()">Stop</button>
  <button id="proactiveBtn" class="side-btn" onclick="toggleProactive()">Proactive OFF</button>
  <button id="replyBtn" class="side-btn" onclick="toggleReply()" style="display:none">Reply</button>
  <button id="previewBtn" class="side-btn" onclick="previewVoice()">Preview</button>
  <button id="talkBtn">TALK</button>
  <button id="ttsToggle" class="side-btn on" onclick="toggleTTS()">TTS ON</button>
</div>

<script>
const chat = document.getElementById('chat');
const talkBtn = document.getElementById('talkBtn');
const ttsToggle = document.getElementById('ttsToggle');
const voiceSelect = document.getElementById('voiceSelect');
const modelSelect = document.getElementById('modelSelect');
const speedSelect = document.getElementById('speedSelect');
const proactiveBtn = document.getElementById('proactiveBtn');

let ws = null;
let micStream = null;
let mediaRecorder = null;
let audioChunks = [];
let recording = false;
let processing = false;
let ttsEnabled = true;
let proactiveEnabled = false;
let proactiveTimer = null;
let lastSeen = { mei: '', eve: '' };
let audioQueue = [];
let isPlaying = false;
let lastBotId = null;  // 最後にメッセージを送ったボット
let replyMode = false; // Slack返信モード

// --- localStorage 永続化 ---
const STORAGE_KEY = 'voiceChatSettings';

function saveSettings() {
  const settings = {
    voiceSelect: voiceSelect.value,
    modelSelect: modelSelect.value,
    speedSelect: speedSelect.value,
    meiVoice: document.getElementById('meiVoice').value,
    meiSpeed: document.getElementById('meiSpeed').value,
    eveVoice: document.getElementById('eveVoice').value,
    eveSpeed: document.getElementById('eveSpeed').value,
    ttsEnabled,
    proactiveEnabled,
    lastSeen,
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
}

function loadSettings() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function applySettings(settings) {
  if (!settings) return;
  if (settings.voiceSelect) voiceSelect.value = settings.voiceSelect;
  if (settings.modelSelect) modelSelect.value = settings.modelSelect;
  if (settings.speedSelect) speedSelect.value = settings.speedSelect;
  if (settings.meiVoice) document.getElementById('meiVoice').value = settings.meiVoice;
  if (settings.meiSpeed) document.getElementById('meiSpeed').value = settings.meiSpeed;
  if (settings.eveVoice) document.getElementById('eveVoice').value = settings.eveVoice;
  if (settings.eveSpeed) document.getElementById('eveSpeed').value = settings.eveSpeed;
  if (settings.ttsEnabled !== undefined) {
    ttsEnabled = settings.ttsEnabled;
    ttsToggle.textContent = ttsEnabled ? 'TTS ON' : 'TTS OFF';
    ttsToggle.className = ttsEnabled ? 'side-btn on' : 'side-btn';
  }
  if (settings.lastSeen) lastSeen = settings.lastSeen;
  if (settings.proactiveEnabled) {
    proactiveEnabled = true;
    proactiveBtn.textContent = 'Proactive ON';
    proactiveBtn.className = 'side-btn proactive-on';
    startProactivePolling();
  }
}

// 全 select に change リスナーを付けて自動保存
function autoSave() {
  document.querySelectorAll('select').forEach(el => {
    el.addEventListener('change', saveSettings);
  });
}

// --- マイク ---
async function getMicStream() {
  if (!micStream || !micStream.active) {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  }
  return micStream;
}

// --- WebSocket ---
function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    // 保存済み設定をサーバーに送信
    const s = loadSettings();
    if (s) {
      if (s.voiceSelect) wsSend({ type: 'set_speaker', speaker_id: parseInt(s.voiceSelect) });
      if (s.speedSelect) wsSend({ type: 'set_speed', speed: parseFloat(s.speedSelect) });
      if (s.modelSelect) wsSend({ type: 'set_model', model: s.modelSelect });
    }
  };

  ws.onmessage = (e) => {
    if (e.data instanceof ArrayBuffer) {
      // ステータスメッセージをクリア
      const statusEl = chat.querySelector('.msg.status');
      if (statusEl) statusEl.remove();
      if (ttsEnabled) playAudio(e.data);
      processing = false;
      talkBtn.disabled = false;
      updateTalkBtn();
      return;
    }

    const msg = JSON.parse(e.data);
    if (msg.type === 'status') {
      addMessage(msg.text, 'status');
    } else if (msg.type === 'user_text') {
      addMessage(msg.text, 'user');
    } else if (msg.type === 'assistant_text') {
      addMessage(msg.text, 'assistant');
      if (msg.tts_fallback) {
        if (ttsEnabled) speak(msg.text);
        processing = false;
        talkBtn.disabled = false;
        updateTalkBtn();
      }
    } else if (msg.type === 'reply_ended') {
      replyMode = false;
      updateReplyUI();
      processing = false;
      talkBtn.disabled = false;
      updateTalkBtn();
    }
  };

  ws.onclose = () => setTimeout(connect, 2000);
}

function wsSend(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

// --- 音声再生キュー (AudioContext でバックグラウンド再生対応) ---
let audioCtx = null;
let currentSource = null;

function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  return audioCtx;
}

function playAudio(arrayBuffer) {
  audioQueue.push(arrayBuffer);
  processQueue();
}

function processQueue() {
  if (isPlaying || audioQueue.length === 0) return;
  isPlaying = true;
  const buf = audioQueue.shift();
  const ctx = getAudioContext();
  ctx.decodeAudioData(buf.slice(0), (audioBuffer) => {
    const source = ctx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(ctx.destination);
    currentSource = source;
    source.onended = () => {
      currentSource = null;
      isPlaying = false;
      processQueue();
    };
    source.start(0);
  }, (err) => {
    console.error('decodeAudioData error:', err);
    currentSource = null;
    isPlaying = false;
    processQueue();
  });
}

function stopAudio() {
  audioQueue.length = 0;
  if (currentSource) {
    try { currentSource.stop(); } catch {}
    currentSource = null;
  }
  isPlaying = false;
  speechSynthesis.cancel();
}

// ユーザー操作で AudioContext を初期化（autoplay policy 対策）
document.addEventListener('click', () => getAudioContext(), { once: true });

// --- UI ---
function addMessage(text, type) {
  if (type === 'status') {
    const prev = chat.querySelector('.msg.status');
    if (prev) prev.remove();
  }
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  const voices = speechSynthesis.getVoices();
  const jaVoice = voices.find(v => v.lang.startsWith('ja'));
  if (jaVoice) u.voice = jaVoice;
  u.rate = 1.1;
  speechSynthesis.speak(u);
}

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  ttsToggle.textContent = ttsEnabled ? 'TTS ON' : 'TTS OFF';
  ttsToggle.className = ttsEnabled ? 'side-btn on' : 'side-btn';
  if (!ttsEnabled) speechSynthesis.cancel();
  saveSettings();
}

// --- 録音 ---
async function startRecording() {
  const stream = await getMicStream();
  audioChunks = [];
  mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });

  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) audioChunks.push(e.data);
  };

  mediaRecorder.onstop = async () => {
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    const buf = await blob.arrayBuffer();
    if (ws && ws.readyState === WebSocket.OPEN) {
      // 返信モードの場合、音声送信前にコマンドを送る
      if (replyMode && lastBotId) {
        const speaker = document.getElementById(`${lastBotId}Voice`).value;
        const speed = document.getElementById(`${lastBotId}Speed`).value;
        wsSend({ type: 'slack_reply', bot_id: lastBotId, speaker_id: parseInt(speaker), speed: parseFloat(speed) });
      }
      processing = true;
      talkBtn.disabled = true;
      talkBtn.textContent = '...';
      ws.send(buf);
    }
  };

  mediaRecorder.start();
  recording = true;
  talkBtn.classList.add('recording');
  talkBtn.textContent = 'STOP';
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    recording = false;
    talkBtn.classList.remove('recording');
  }
}

talkBtn.addEventListener('click', (e) => {
  e.preventDefault();
  if (processing) return;
  if (recording) {
    stopRecording();
  } else {
    startRecording();
  }
});

// --- 音声切り替え（メイン、WebSocket にも送信）---
voiceSelect.addEventListener('change', () => {
  wsSend({ type: 'set_speaker', speaker_id: parseInt(voiceSelect.value) });
  saveSettings();
});
speedSelect.addEventListener('change', () => {
  wsSend({ type: 'set_speed', speed: parseFloat(speedSelect.value) });
  saveSettings();
});
modelSelect.addEventListener('change', () => {
  wsSend({ type: 'set_model', model: modelSelect.value });
  saveSettings();
});

// --- Bot メッセージ再生 ---
async function playBotMessage(botId) {
  const btns = document.querySelectorAll('.bot-play');
  btns.forEach(b => b.disabled = true);
  try {
    const textResp = await fetch(`/api/bot-text/${botId}`);
    if (!textResp.ok) {
      addMessage(`[${botId}] メッセージが見つかりません`, 'status');
      btns.forEach(b => b.disabled = false);
      return;
    }
    const { text, sentAt } = await textResp.json();
    addMessage(`[${botId}] ${text}`, 'assistant');
    lastSeen[botId] = sentAt;
    lastBotId = botId;
    updateReplyUI();
    saveSettings();

    const speaker = document.getElementById(`${botId}Voice`).value;
    const speed = document.getElementById(`${botId}Speed`).value;
    const audioResp = await fetch(`/api/bot-audio/${botId}?speaker=${speaker}&speed=${speed}`);
    const buf = await audioResp.arrayBuffer();
    playAudio(buf);
  } catch (e) {
    console.error(e);
  }
  btns.forEach(b => b.disabled = false);
}

// --- 音声プレビュー ---
async function previewVoice() {
  const btn = document.getElementById('previewBtn');
  btn.disabled = true;
  btn.textContent = '...';
  try {
    const speaker = voiceSelect.value;
    const speed = speedSelect.value;
    const resp = await fetch(`/api/preview?speaker=${speaker}&speed=${speed}`);
    const buf = await resp.arrayBuffer();
    playAudio(buf);
  } catch (e) {
    console.error(e);
  }
  btn.disabled = false;
  btn.textContent = 'Preview';
}

// --- Slack 返信モード ---
const replyBtn = document.getElementById('replyBtn');

function updateReplyUI() {
  if (lastBotId) {
    replyBtn.style.display = '';
    if (replyMode) {
      replyBtn.textContent = `Reply ${lastBotId} ON`;
      replyBtn.className = 'side-btn reply-on';
    } else {
      replyBtn.textContent = `Reply ${lastBotId}`;
      replyBtn.className = 'side-btn';
    }
  } else {
    replyBtn.style.display = 'none';
  }
  updateTalkBtn();
}

function updateTalkBtn() {
  if (replyMode) {
    talkBtn.textContent = 'REPLY';
    talkBtn.classList.add('reply-mode');
  } else {
    talkBtn.textContent = 'TALK';
    talkBtn.classList.remove('reply-mode');
  }
}

function toggleReply() {
  replyMode = !replyMode;
  if (replyMode && lastBotId) {
    const speaker = document.getElementById(`${lastBotId}Voice`).value;
    const speed = document.getElementById(`${lastBotId}Speed`).value;
    wsSend({ type: 'slack_reply', bot_id: lastBotId, speaker_id: parseInt(speaker), speed: parseFloat(speed) });
  } else {
    wsSend({ type: 'cancel_reply' });
  }
  updateReplyUI();
}

// --- プロアクティブモード ---
function toggleProactive() {
  proactiveEnabled = !proactiveEnabled;
  proactiveBtn.textContent = proactiveEnabled ? 'Proactive ON' : 'Proactive OFF';
  proactiveBtn.className = proactiveEnabled ? 'side-btn proactive-on' : 'side-btn';
  if (proactiveEnabled) {
    startProactivePolling();
  } else {
    stopProactivePolling();
  }
  saveSettings();
}

function startProactivePolling() {
  if (proactiveTimer) return;
  proactiveTimer = setInterval(checkProactiveMessages, 30000);
  // 初回は即実行
  checkProactiveMessages();
}

function stopProactivePolling() {
  if (proactiveTimer) {
    clearInterval(proactiveTimer);
    proactiveTimer = null;
  }
}

async function checkProactiveMessages() {
  for (const botId of ['mei', 'eve']) {
    try {
      const resp = await fetch(`/api/bot-text/${botId}`);
      if (!resp.ok) continue;
      const { text, sentAt } = await resp.json();
      if (sentAt && sentAt !== lastSeen[botId]) {
        lastSeen[botId] = sentAt;
        lastBotId = botId;
        updateReplyUI();
        saveSettings();
        addMessage(`[${botId}] ${text}`, 'assistant');

        const speaker = document.getElementById(`${botId}Voice`).value;
        const speed = document.getElementById(`${botId}Speed`).value;
        const audioResp = await fetch(`/api/bot-audio/${botId}?speaker=${speaker}&speed=${speed}`);
        const buf = await audioResp.arrayBuffer();
        playAudio(buf);
      }
    } catch (e) {
      console.error(`proactive check ${botId}:`, e);
    }
  }
}

// --- スピーカー・モデル読み込み ---
async function loadSpeakers() {
  const resp = await fetch('/api/speakers');
  const speakers = await resp.json();

  const selects = [
    { el: voiceSelect, defaultId: 2 },
    { el: document.getElementById('meiVoice'), defaultId: 2 },
    { el: document.getElementById('eveVoice'), defaultId: 13 },
  ];
  for (const { el, defaultId } of selects) {
    el.innerHTML = '';
    for (const s of speakers) {
      for (const st of s.styles) {
        const opt = document.createElement('option');
        opt.value = st.id;
        opt.textContent = `${s.name} - ${st.name}`;
        if (st.id === defaultId) opt.selected = true;
        el.appendChild(opt);
      }
    }
  }
}

async function loadModels() {
  const resp = await fetch('/api/models');
  const models = await resp.json();
  modelSelect.innerHTML = '';
  for (const m of models) {
    const opt = document.createElement('option');
    opt.value = m.name;
    opt.textContent = `${m.name} (${m.size})`;
    if (m.name === 'gemma4:e4b') opt.selected = true;
    modelSelect.appendChild(opt);
  }
}

// --- 初期化 ---
async function init() {
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  await loadSpeakers();
  await loadModels();
  const saved = loadSettings();
  applySettings(saved);
  autoSave();
  connect();
}

init();
</script>

</body>
</html>
