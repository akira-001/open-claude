<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ember Chat</title>
<style>
  :root {
    --ember-bg: #1c1820;
    --ember-surface: #252030;
    --ember-surface-alt: #1e1928;
    --ember-accent: #e94560;
    --ember-accent-hover: #d63851;
    --ember-accent-glow: rgba(233, 69, 96, 0.12);
    --ember-warm: #f5a623;
    --ember-text: #e8e4ed;
    --ember-text-muted: #9a93a8;
    --ember-text-dim: #6b6478;
    --ember-border: #3a3344;
    --ember-input-bg: #16121c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', 'Segoe UI', sans-serif;
    background: var(--ember-bg);
    color: var(--ember-text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #appHeader {
    padding: 12px 20px;
    background: var(--ember-surface);
    border-bottom: 1px solid var(--ember-border);
    flex-shrink: 0;
  }
  #appHeader h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--ember-accent);
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  #emptyState {
    margin: auto;
    text-align: center;
    color: var(--ember-text-dim);
  }
  .empty-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.6;
  }
  #emptyState p {
    font-size: 15px;
  }
  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.5;
    font-size: 15px;
  }
  .msg.user {
    align-self: flex-end;
    background: #3a2040;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--ember-surface);
    border-bottom-left-radius: 4px;
  }
  .msg.status {
    align-self: center;
    background: none;
    color: var(--ember-text-dim);
    font-size: 13px;
    padding: 4px;
  }
  #controls {
    padding: 16px 20px;
    display: flex;
    justify-content: center;
    gap: 12px;
    align-items: center;
    background: var(--ember-surface);
    flex-wrap: wrap;
  }
  #talkBtn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 3px solid var(--ember-accent);
    background: transparent;
    color: var(--ember-accent);
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
    user-select: none;
    -webkit-user-select: none;
  }
  #talkBtn:hover { background: var(--ember-accent-glow); }
  #talkBtn.recording {
    background: var(--ember-accent);
    color: #fff;
    animation: pulse 1s infinite;
  }
  #talkBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }
  .side-btn {
    background: none;
    border: 1px solid var(--ember-border);
    color: var(--ember-text-muted);
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    min-height: 44px;
    transition: border-color 0.15s, color 0.15s;
  }
  .side-btn:hover { border-color: var(--ember-text-muted); }
  .side-btn.on { border-color: var(--ember-accent); color: var(--ember-accent); }
  .side-btn.proactive-on { border-color: #2ecc71; color: #2ecc71; }
  select {
    background: var(--ember-input-bg);
    color: var(--ember-text-muted);
    border: 1px solid var(--ember-border);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    min-height: 44px;
  }
  select:focus { border-color: var(--ember-accent); color: var(--ember-text); outline: none; }
  #voiceSelect { max-width: 160px; }
  #modelSelect { max-width: 200px; }
  #toolbar {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 10px 20px;
    background: var(--ember-surface);
    border-top: 1px solid var(--ember-border);
    flex-wrap: wrap;
    align-items: center;
  }
  .toolbar-label {
    color: var(--ember-text-dim);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-right: -4px;
  }
  .bot-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    background: var(--ember-surface);
    border-bottom: 1px solid var(--ember-border);
  }
  .bot-row .bot-name {
    color: var(--ember-accent);
    font-size: 13px;
    font-weight: bold;
    min-width: 32px;
  }
  .bot-row select {
    font-size: 12px;
    padding: 8px 8px;
    min-height: 44px;
  }
  .bot-row .bot-play {
    background: none;
    border: 1px solid var(--ember-accent);
    color: var(--ember-accent);
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    min-height: 44px;
    transition: background 0.15s;
  }
  .bot-row .bot-play:hover { background: var(--ember-accent-glow); }
  .bot-row .bot-play:disabled { opacity: 0.4; }
  .side-btn.reply-on { border-color: var(--ember-accent); color: var(--ember-accent); }
  #talkBtn.reply-mode { border-color: var(--ember-warm); color: var(--ember-warm); }
  #talkBtn.reply-mode:hover { background: rgba(245, 166, 35, 0.1); }
  #talkBtn.reply-mode.recording { background: var(--ember-warm); color: #fff; }
  #textInputRow {
    display: flex;
    gap: 8px;
    padding: 10px 20px;
    background: var(--ember-surface);
    border-top: 1px solid var(--ember-border);
  }
  #textInput {
    flex: 1;
    background: var(--ember-input-bg);
    color: var(--ember-text);
    border: 1px solid var(--ember-border);
    padding: 12px 16px;
    border-radius: 22px;
    font-size: 15px;
    outline: none;
    min-height: 44px;
    transition: border-color 0.15s;
  }
  #textInput:focus { border-color: var(--ember-accent); }
  #textInput::placeholder { color: var(--ember-text-dim); }
  #sendBtn {
    background: var(--ember-accent);
    color: #fff;
    border: none;
    padding: 12px 22px;
    border-radius: 22px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    min-height: 44px;
    transition: background 0.15s;
  }
  #sendBtn:hover { background: var(--ember-accent-hover); }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  /* Server status bar */
  #serverStatus {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 20px;
    background: var(--ember-surface-alt);
    border-bottom: 1px solid var(--ember-border);
    flex-shrink: 0;
    font-size: 12px;
  }
  .srv-item {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--ember-text-muted);
  }
  .srv-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ef4444;
  }
  .srv-dot.online { background: #22c55e; }
  .srv-start {
    padding: 2px 10px;
    border-radius: 4px;
    border: 1px solid var(--ember-border);
    background: transparent;
    color: var(--ember-text-muted);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .srv-start:hover { border-color: var(--ember-accent); color: var(--ember-accent); }
  .srv-start:disabled { opacity: 0.4; cursor: not-allowed; }

  /* --- Tab navigation --- */
  .tab-bar { display: flex; gap: 0; background: var(--ember-surface); border-bottom: 1px solid var(--ember-border); flex-shrink: 0; }
  .tab-bar button { flex: 1; padding: 10px 16px; background: none; border: none; color: var(--ember-text-muted); font-size: 14px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab-bar button.active { color: var(--ember-accent); border-bottom-color: var(--ember-accent); }
  .tab-bar button:hover:not(.active) { color: var(--ember-text); }
  .tab-content { display: none; flex-direction: column; }
  .tab-content.active { display: flex; }

  /* --- Ambient tab --- */
  #ambientTab { padding: 16px; gap: 16px; overflow-y: auto; flex: 1; }
  .ambient-section { background: var(--ember-surface); border-radius: 12px; padding: 14px; }
  .ambient-section h3 { font-size: 13px; color: var(--ember-text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  .ambient-status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .ambient-status-item { font-size: 13px; }
  .ambient-status-item .label { color: var(--ember-text-muted); }
  .ambient-status-item .value { color: var(--ember-text); font-weight: 600; }
  .reactivity-buttons { display: flex; gap: 6px; }
  .reactivity-buttons button { flex: 1; padding: 8px 4px; border-radius: 8px; border: 1px solid var(--ember-border); background: var(--ember-surface-alt); color: var(--ember-text-muted); font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .reactivity-buttons button.active { background: var(--ember-accent); color: white; border-color: var(--ember-accent); }
  .reactivity-buttons button:hover:not(.active) { border-color: var(--ember-accent); color: var(--ember-text); }
  .ambient-log { max-height: 200px; overflow-y: auto; font-size: 12px; font-family: monospace; }
  .ambient-log-entry { padding: 4px 0; border-bottom: 1px solid var(--ember-border); }
  .ambient-log-entry .time { color: var(--ember-text-dim); }
  .ambient-log-entry .method { color: var(--ember-warm); }
  .ambient-log-entry .result-speak { color: #2ecc71; }
  .ambient-log-entry .result-skip { color: var(--ember-text-dim); }
  .ambient-log-entry .intervention-backchannel { color: #f5a623; }
  .ambient-log-entry .intervention-reply { color: #22c55e; }
  .ambient-log-entry .intervention-skip { color: var(--ember-text-dim); }
  .ambient-list { max-height: 200px; overflow-y: auto; }
  .ambient-list-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--ember-border); font-size: 13px; }
  .ambient-list-item .toggle { cursor: pointer; opacity: 0.7; }
  .ambient-list-item .toggle:hover { opacity: 1; }
  .ambient-list-item .text { flex: 1; }
  .ambient-list-item .delete { cursor: pointer; color: var(--ember-text-dim); font-size: 16px; }
  .ambient-list-item .delete:hover { color: var(--ember-accent); }
  .ambient-add-row { display: flex; gap: 6px; margin-top: 8px; }
  .ambient-add-row input { flex: 1; background: var(--ember-input-bg); border: 1px solid var(--ember-border); border-radius: 6px; padding: 6px 10px; color: var(--ember-text); font-size: 13px; }
  .ambient-add-row button { background: var(--ember-accent); border: none; border-radius: 6px; padding: 6px 12px; color: white; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .ambient-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; }
  .ambient-stats .stat-value { font-size: 20px; font-weight: 700; color: var(--ember-accent); }
</style>
</head>
<body>

<header id="appHeader">
  <h1>Ember Chat</h1>
</header>
<div id="serverStatus" class="srv-bar">
  <span class="srv-item">
    <span id="srvWhisperDot" class="srv-dot"></span>
    <span>Whisper</span>
    <button id="srvWhisperBtn" class="srv-start" onclick="startServer('whisper')" style="display:none">Start</button>
  </span>
  <span class="srv-item">
    <span id="srvVoicevoxDot" class="srv-dot"></span>
    <span>VOICEVOX</span>
    <button id="srvVoicevoxBtn" class="srv-start" onclick="startServer('voicevox')" style="display:none">Start</button>
  </span>
  <span class="srv-item">
    <span id="srvOllamaDot" class="srv-dot"></span>
    <span>Ollama</span>
    <button id="srvOllamaBtn" class="srv-start" onclick="startServer('ollama')" style="display:none">Start</button>
  </span>
</div>
<div class="tab-bar">
  <button id="tabChat" class="active" onclick="switchTab('chat')">Chat</button>
  <button id="tabAmbient" onclick="switchTab('ambient')">Ambient</button>
</div>
<div id="chatTab" class="tab-content active" style="flex:1; display:flex; flex-direction:column;">
<div id="chat">
  <div id="emptyState">
    <div class="empty-icon">&#x1F525;</div>
    <p>Voice or text, your call.</p>
  </div>
</div>

<div id="toolbar">
  <span class="toolbar-label">Model</span>
  <select id="modelSelect"></select>
  <span class="toolbar-label">TTS</span>
  <select id="ttsEngineSelect">
    <option value="voicevox">VOICEVOX</option>
    <option value="irodori">Irodori</option>
  </select>
  <span class="toolbar-label">Voice</span>
  <select id="voiceSelect"></select>
  <span class="toolbar-label">Speed</span>
  <select id="speedSelect">
    <option value="0.8">0.8x</option>
    <option value="1.0">1.0x</option>
    <option value="1.2">1.2x</option>
    <option value="1.5">1.5x</option>
    <option value="2.0">2.0x</option>
  </select>
</div>
<div class="bot-row">
  <span class="bot-name">Mei</span>
  <select id="meiVoice" class="bot-voice-select"></select>
  <select id="meiSpeed">
    <option value="0.8">0.8x</option>
    <option value="1.0">1.0x</option>
    <option value="1.2">1.2x</option>
    <option value="1.5">1.5x</option>
    <option value="2.0">2.0x</option>
  </select>
  <button class="bot-play" onclick="playBotMessage('mei')">Play</button>
</div>
<div class="bot-row">
  <span class="bot-name">Eve</span>
  <select id="eveVoice" class="bot-voice-select"></select>
  <select id="eveSpeed">
    <option value="0.8">0.8x</option>
    <option value="1.0">1.0x</option>
    <option value="1.2">1.2x</option>
    <option value="1.5">1.5x</option>
    <option value="2.0">2.0x</option>
  </select>
  <button class="bot-play" onclick="playBotMessage('eve')">Play</button>
</div>
<div id="controls">
  <button id="stopBtn" class="side-btn" onclick="stopAudio()">Stop</button>
  <button id="proactiveBtn" class="side-btn" onclick="toggleProactive()">Proactive OFF</button>
  <button id="replyBtn" class="side-btn" onclick="toggleReply()" style="display:none">Reply</button>
  <button id="previewBtn" class="side-btn" onclick="previewVoice()">Preview</button>
  <button id="talkBtn">TALK</button>
  <button id="ttsToggle" class="side-btn on" onclick="toggleTTS()">TTS ON</button>
</div>
<div id="textInputRow">
  <input type="text" id="textInput" placeholder="メッセージを入力..." autocomplete="off">
  <button id="sendBtn" onclick="sendTextMessage()">Send</button>
</div>
</div><!-- /chatTab -->

<div id="ambientTab" class="tab-content">
  <div class="ambient-section">
    <h3>Current State</h3>
    <div class="ambient-status-grid">
      <div class="ambient-status-item"><span class="label">Reactivity: </span><span class="value" id="ambStatusLevel">3 (普通)</span></div>
      <div class="ambient-status-item"><span class="label">Override: </span><span class="value" id="ambStatusOverride">-</span></div>
      <div class="ambient-status-item"><span class="label">State: </span><span class="value" id="ambStatusState">idle</span></div>
      <div class="ambient-status-item"><span class="label">Last: </span><span class="value" id="ambStatusLast">-</span></div>
    </div>
  </div>

  <div class="ambient-section">
    <h3>Reactivity Level</h3>
    <div class="reactivity-buttons" id="reactivityBtns">
      <button onclick="setReactivity(1)">1 静か</button>
      <button onclick="setReactivity(2)">2 控えめ</button>
      <button class="active" onclick="setReactivity(3)">3 普通</button>
      <button onclick="setReactivity(4)">4 積極的</button>
      <button onclick="setReactivity(5)">5 話好き</button>
    </div>
  </div>

  <div class="ambient-section">
    <h3>Judgment Log</h3>
    <div class="ambient-log" id="ambientLog"></div>
  </div>

  <div class="ambient-section">
    <h3>Rules <span id="ambRulesCount"></span></h3>
    <div class="ambient-list" id="ambientRulesList"></div>
    <div class="ambient-add-row">
      <input type="text" id="ambNewRule" placeholder="新しいルールを追加...">
      <button onclick="addAmbientRule()">Add</button>
    </div>
  </div>

  <div class="ambient-section">
    <h3>Examples <span id="ambExamplesCount"></span></h3>
    <div class="ambient-list" id="ambientExamplesList"></div>
    <div class="ambient-add-row">
      <input type="text" id="ambNewExContext" placeholder="状況..." style="flex:1">
      <input type="text" id="ambNewExResponse" placeholder="MEIの反応..." style="flex:1">
      <button onclick="addAmbientExample()">Add</button>
    </div>
  </div>

  <div class="ambient-section">
    <h3>Stats (Today)</h3>
    <div class="ambient-stats" id="ambientStats">
      <div><div class="stat-value" id="statSpeaks">0</div><div class="label">Speaks</div></div>
      <div><div class="stat-value" id="statJudgments">0</div><div class="label">Judgments</div></div>
      <div><div class="stat-value" id="statRate">0%</div><div class="label">Rate</div></div>
      <div><div class="stat-value" id="statFeedback">+0/-0</div><div class="label">Feedback</div></div>
    </div>
  </div>
</div>

<script>
const EMBED_MODE = new URLSearchParams(window.location.search).has('embed');
if (EMBED_MODE) {
  document.getElementById('appHeader').style.display = 'none';
  document.getElementById('serverStatus').style.display = 'none';
}

// embed モード時: 親オリジン経由（プロキシ）、スタンドアロン時: 直接
const API_BASE = EMBED_MODE ? '/whisper/api' : '/api';
const DASHBOARD_API = EMBED_MODE ? '/api' : 'http://localhost:3456/api';
const WS_URL = EMBED_MODE ? `ws://${location.host}/ws` : `ws://${location.host}/ws`;

// --- Server status check ---
async function checkServerStatus() {
  try {
    const res = await fetch(`${DASHBOARD_API}/local-models/server-status`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    updateSrvUI('Whisper', data.whisper?.running ?? false);
    updateSrvUI('Voicevox', data.voicevox?.running ?? false);
    updateSrvUI('Ollama', data.ollama?.running ?? false);
  } catch {
    updateSrvUI('Whisper', false);
    updateSrvUI('Voicevox', false);
    updateSrvUI('Ollama', false);
  }
}

function updateSrvUI(name, running) {
  const dot = document.getElementById(`srv${name}Dot`);
  const btn = document.getElementById(`srv${name}Btn`);
  if (dot) dot.classList.toggle('online', running);
  if (btn) btn.style.display = running ? 'none' : 'inline-block';
}

async function startServer(server) {
  const btn = document.getElementById(`srv${server.charAt(0).toUpperCase() + server.slice(1)}Btn`);
  if (btn) { btn.disabled = true; btn.textContent = 'Starting...'; }
  try {
    await fetch(`${DASHBOARD_API}/local-models/${server}/start`, { method: 'POST' });
    // Wait for server to come up
    await new Promise(r => setTimeout(r, 3000));
    await checkServerStatus();
  } catch (e) {
    console.error('Failed to start', server, e);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Start'; }
  }
}

// Check status on load and every 10s
checkServerStatus();
setInterval(checkServerStatus, 10000);

const chat = document.getElementById('chat');
const talkBtn = document.getElementById('talkBtn');
const ttsToggle = document.getElementById('ttsToggle');
const voiceSelect = document.getElementById('voiceSelect');
const modelSelect = document.getElementById('modelSelect');
const speedSelect = document.getElementById('speedSelect');
const proactiveBtn = document.getElementById('proactiveBtn');
const ttsEngineSelect = document.getElementById('ttsEngineSelect');

let ws = null;
let micStream = null;
let mediaRecorder = null;
let audioChunks = [];
let recording = false;
let processing = false;
let ttsEnabled = true;
let proactiveEnabled = false;
// proactive polling はサーバー側で実行
let lastSeen = { mei: '', eve: '' };
let audioQueue = [];
let isPlaying = false;
let lastBotId = null;  // 最後にメッセージを送ったボット
let replyMode = false; // Slack返信モード
let playedMessageIds = new Set();  // 再生済みメッセージ ID（重複防止）

// --- タブ間排他制御（BroadcastChannel）---
// 複数タブで開いている場合、1つのタブだけが音声を再生する
const _bc = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel('ember-audio') : null;
if (_bc) {
  _bc.onmessage = (e) => {
    if (e.data?.type === 'played') {
      playedMessageIds.add(e.data.id);
    }
  };
}

// --- サーバー同期設定 ---
let _syncing = false; // サーバーからの同期中フラグ（ループ防止）
let _lastSaveTime = 0; // saveSettings の最終実行時刻（競合防止）

function getSettingsSnapshot() {
  return {
    ttsEngine: ttsEngineSelect.value,
    voiceSelect: voiceSelect.value,
    modelSelect: modelSelect.value,
    speedSelect: speedSelect.value,
    meiVoice: document.getElementById('meiVoice').value,
    meiSpeed: document.getElementById('meiSpeed').value,
    eveVoice: document.getElementById('eveVoice').value,
    eveSpeed: document.getElementById('eveSpeed').value,
    ttsEnabled,
    proactiveEnabled,
    lastSeen,
  };
}

function saveSettings() {
  if (_syncing) return;
  _lastSaveTime = Date.now();
  const settings = getSettingsSnapshot();
  // サーバーに送信（全ブラウザに同期される）
  wsSend({ type: 'update_settings', settings });
}

async function applySettings(settings) {
  if (!settings) return;
  // 自分が saveSettings した直後の sync_settings は無視（競合防止）
  if (Date.now() - _lastSaveTime < 500) return;
  _syncing = true;
  if (settings.ttsEngine && ttsEngineSelect.value !== settings.ttsEngine) {
    ttsEngineSelect.value = settings.ttsEngine;
    await loadSpeakers(settings.ttsEngine, settings);
  }
  if (settings.voiceSelect && voiceSelect.value !== String(settings.voiceSelect)) {
    voiceSelect.value = settings.voiceSelect;
  }
  if (settings.modelSelect && modelSelect.value !== settings.modelSelect) {
    modelSelect.value = settings.modelSelect;
  }
  if (settings.speedSelect && speedSelect.value !== String(settings.speedSelect)) {
    speedSelect.value = settings.speedSelect;
  }
  if (settings.meiVoice) document.getElementById('meiVoice').value = settings.meiVoice;
  if (settings.meiSpeed) document.getElementById('meiSpeed').value = settings.meiSpeed;
  if (settings.eveVoice) document.getElementById('eveVoice').value = settings.eveVoice;
  if (settings.eveSpeed) document.getElementById('eveSpeed').value = settings.eveSpeed;
  if (settings.ttsEnabled !== undefined) {
    ttsEnabled = settings.ttsEnabled;
    ttsToggle.textContent = ttsEnabled ? 'TTS ON' : 'TTS OFF';
    ttsToggle.className = ttsEnabled ? 'side-btn on' : 'side-btn';
  }
  if (settings.lastSeen) lastSeen = settings.lastSeen;
  if (settings.proactiveEnabled !== undefined) {
    const wasEnabled = proactiveEnabled;
    proactiveEnabled = settings.proactiveEnabled;
    proactiveBtn.textContent = proactiveEnabled ? 'Proactive ON' : 'Proactive OFF';
    proactiveBtn.className = proactiveEnabled ? 'side-btn proactive-on' : 'side-btn';
    // proactive polling はサーバー側で実行するため、クライアント側の開始/停止は不要
  }
  _syncing = false;
}

// --- WebSocket ---
function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    // サーバーから sync_settings が送られてくるので待つだけ
  };

  ws.onmessage = async (e) => {
    if (e.data instanceof ArrayBuffer) {
      // ステータスメッセージをクリア
      const statusEl = chat.querySelector('.msg.status');
      if (statusEl) statusEl.remove();
      if (ttsEnabled) playAudio(e.data);
      processing = false;
      talkBtn.disabled = false;
      sendBtn.disabled = false;
      updateTalkBtn();
      return;
    }

    const msg = JSON.parse(e.data);
    if (msg.type && msg.type.startsWith('ambient')) {
      handleAmbientWS(msg);
      return;
    }
    if (msg.type === 'stop_audio') {
      stopAudio(false);
      return;
    }
    if (msg.type === 'proactive_message') {
      // ts ベースの重複排除（同一タブ内 + 複数タブ間で二重再生防止）
      const msgId = msg.ts || `${msg.botId}-${msg.text}`;
      if (playedMessageIds.has(msgId)) return;
      playedMessageIds.add(msgId);
      // 他タブに「再生済み」を通知
      if (_bc) _bc.postMessage({ type: 'played', id: msgId });
      // メモリリーク防止
      if (playedMessageIds.size > 100) {
        const arr = [...playedMessageIds];
        playedMessageIds = new Set(arr.slice(-50));
      }
      handleProactiveMessage(msg.botId, msg.text, msg.speaker, msg.speed);
      return;
    }
    if (msg.type === 'sync_settings') {
      await applySettings(msg.settings);
      // サーバー設定でローカルの WS 状態も更新
      const vid = msg.settings.voiceSelect;
      if (vid) wsSend({ type: 'set_speaker', speaker_id: /^\d+$/.test(vid) ? parseInt(vid) : vid });
      if (msg.settings.speedSelect) wsSend({ type: 'set_speed', speed: parseFloat(msg.settings.speedSelect) });
      if (msg.settings.modelSelect) wsSend({ type: 'set_model', model: msg.settings.modelSelect });
      return;
    }
    if (msg.type === 'status') {
      addMessage(msg.text, 'status');
    } else if (msg.type === 'user_text') {
      addMessage(msg.text, 'user');
    } else if (msg.type === 'assistant_text') {
      addMessage(msg.text, 'assistant');
      if (msg.tts_fallback) {
        if (ttsEnabled) speak(msg.text);
        processing = false;
        talkBtn.disabled = false;
        updateTalkBtn();
      }
    } else if (msg.type === 'reply_ended') {
      // Reply モードで受信済みの ts を記録し、proactive polling の重複再生を防ぐ
      if (msg.bot_id && msg.reply_ts) {
        lastSeen[msg.bot_id] = msg.reply_ts;
        saveSettings();
      }
      replyMode = false;
      updateReplyUI();
      processing = false;
      talkBtn.disabled = false;
      sendBtn.disabled = false;
      updateTalkBtn();
    }
  };

  ws.onclose = () => setTimeout(connect, 2000);
}

function wsSend(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

// --- 音声再生キュー (AudioContext でバックグラウンド再生対応) ---
let audioCtx = null;
let currentSource = null;

function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  return audioCtx;
}

function playAudio(arrayBuffer) {
  audioQueue.push(arrayBuffer);
  processQueue();
}

function processQueue() {
  if (isPlaying || audioQueue.length === 0) return;
  isPlaying = true;
  const buf = audioQueue.shift();
  const ctx = getAudioContext();
  ctx.decodeAudioData(buf.slice(0), (audioBuffer) => {
    const source = ctx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(ctx.destination);
    currentSource = source;
    source.onended = () => {
      currentSource = null;
      isPlaying = false;
      processQueue();
    };
    source.start(0);
  }, (err) => {
    console.error('decodeAudioData error:', err);
    currentSource = null;
    isPlaying = false;
    processQueue();
  });
}

function stopAudio(broadcast = true) {
  audioQueue.length = 0;
  if (currentSource) {
    try { currentSource.stop(); } catch {}
    currentSource = null;
  }
  isPlaying = false;
  speechSynthesis.cancel();
  if (broadcast) wsSend({ type: 'stop_audio' });
}

// ユーザー操作で AudioContext を初期化（autoplay policy 対策）
document.addEventListener('click', () => getAudioContext(), { once: true });

// --- UI ---
function addMessage(text, type) {
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();
  if (type === 'status') {
    const prev = chat.querySelector('.msg.status');
    if (prev) prev.remove();
  }
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  const voices = speechSynthesis.getVoices();
  const jaVoice = voices.find(v => v.lang.startsWith('ja'));
  if (jaVoice) u.voice = jaVoice;
  u.rate = 1.1;
  speechSynthesis.speak(u);
}

// --- 録音 ---
async function startRecording() {
  const stream = await getMicStream();
  audioChunks = [];
  mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });

  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) audioChunks.push(e.data);
  };

  mediaRecorder.onstop = async () => {
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    const buf = await blob.arrayBuffer();
    if (ws && ws.readyState === WebSocket.OPEN) {
      // 返信モードの場合、音声送信前にコマンドを送る
      if (replyMode && lastBotId) {
        const speaker = document.getElementById(`${lastBotId}Voice`).value;
        const speed = document.getElementById(`${lastBotId}Speed`).value;
        wsSend({ type: 'slack_reply', bot_id: lastBotId, speaker_id: parseInt(speaker), speed: parseFloat(speed) });
      }
      processing = true;
      talkBtn.disabled = true;
      talkBtn.textContent = '...';
      ws.send(buf);
    }
  };

  mediaRecorder.start();
  recording = true;
  talkBtn.classList.add('recording');
  talkBtn.textContent = 'STOP';
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    recording = false;
    talkBtn.classList.remove('recording');
  }
}

talkBtn.addEventListener('click', (e) => {
  e.preventDefault();
  if (processing) return;
  if (recording) {
    stopRecording();
  } else {
    startRecording();
  }
});

// --- Bot メッセージ再生 ---
async function playBotMessage(botId) {
  const btns = document.querySelectorAll('.bot-play');
  btns.forEach(b => b.disabled = true);
  try {
    const textResp = await fetch(`${API_BASE}/bot-text/${botId}`);
    if (!textResp.ok) {
      addMessage(`[${botId}] メッセージが見つかりません`, 'status');
      btns.forEach(b => b.disabled = false);
      return;
    }
    const { text, sentAt } = await textResp.json();
    addMessage(`[${botId}] ${text}`, 'assistant');
    lastSeen[botId] = sentAt;
    lastBotId = botId;
    updateReplyUI();
    saveSettings();

    const speaker = document.getElementById(`${botId}Voice`).value;
    const speed = document.getElementById(`${botId}Speed`).value;
    const audioResp = await fetch(`${API_BASE}/bot-audio/${botId}?speaker=${speaker}&speed=${speed}`);
    const buf = await audioResp.arrayBuffer();
    playAudio(buf);
  } catch (e) {
    console.error(e);
  }
  btns.forEach(b => b.disabled = false);
}

// --- スピーカー・モデル読み込み ---
async function loadSpeakers(engine, savedSettings) {
  const eng = engine || ttsEngineSelect.value || 'voicevox';
  const resp = await fetch(`${API_BASE}/speakers?engine=${eng}`);
  const speakers = await resp.json();

  const isIrodori = eng === 'irodori';
  const selects = [
    { el: voiceSelect, key: 'voiceSelect', defaultId: isIrodori ? 'irodori-calm-female' : 2 },
    { el: document.getElementById('meiVoice'), key: 'meiVoice', defaultId: isIrodori ? 'irodori-calm-female' : 2 },
    { el: document.getElementById('eveVoice'), key: 'eveVoice', defaultId: isIrodori ? 'irodori-cool-female' : 13 },
  ];
  for (const { el, key, defaultId } of selects) {
    const savedId = savedSettings && savedSettings[key];
    const targetId = savedId != null ? savedId : defaultId;
    el.innerHTML = '';
    for (const s of speakers) {
      for (const st of s.styles) {
        const opt = document.createElement('option');
        opt.value = st.id;
        opt.textContent = `${s.name} - ${st.name}`;
        if (String(st.id) === String(targetId)) opt.selected = true;
        el.appendChild(opt);
      }
    }
  }
}

ttsEngineSelect.addEventListener('change', async () => {
  await loadSpeakers(ttsEngineSelect.value);
  saveSettings();
  wsSend({ type: 'update_settings', settings: { ttsEngine: ttsEngineSelect.value, voiceSelect: voiceSelect.value } });
});

async function loadModels() {
  const resp = await fetch(`${API_BASE}/models`);
  const models = await resp.json();
  modelSelect.innerHTML = '';
  for (const m of models) {
    const opt = document.createElement('option');
    opt.value = m.name;
    opt.textContent = `${m.name} (${m.size})`;
    if (m.name === 'gemma4:e4b') opt.selected = true;
    modelSelect.appendChild(opt);
  }
}

  let saved = {};

// --- Ambient WebSocket messages ---
function handleAmbientWS(msg) {
  if (msg.type === 'ambient_state') {
    const d = msg.data;
    const cfg = {1:'\u9759\u304b',2:'\u63a7\u3048\u3081',3:'\u666e\u901a',4:'\u7a4d\u6975\u7684',5:'\u8a71\u597d\u304d'};
    const sourceLabel = {
      user_identified: '本人(声紋一致)',
      user_initiative: '本人(呼びかけ)',
      user_response: '本人(会話継続)',
      user_likely: '本人らしい',
      user_in_conversation: '複数人会話',
      media_likely: 'メディア音声',
      fragmentary: '断片/ノイズ',
      unknown: '不明',
    };
    const interventionLabel = {
      reply: '返答',
      backchannel: '相槌',
      skip: '見守り',
    };
    const eff = d.effective_reactivity || d.reactivity;
    document.getElementById('ambStatusLevel').textContent = eff + ' (' + (cfg[eff] || '?') + ')';
    document.getElementById('ambStatusState').textContent = d.listener_state || '-';
    if (d.override) {
      const min = Math.floor(d.override.remaining_sec / 60);
      const sec = d.override.remaining_sec % 60;
      document.getElementById('ambStatusOverride').textContent = 'Lv' + d.override.level + ' (' + min + ':' + String(sec).padStart(2,'0') + ')';
    } else {
      document.getElementById('ambStatusOverride').textContent = '-';
    }
    if (d.last_judgment) {
      const intervention = d.last_judgment.intervention ? ' / ' + (interventionLabel[d.last_judgment.intervention] || d.last_judgment.intervention) : '';
      const source = d.last_judgment.source_hint ? ' / ' + (sourceLabel[d.last_judgment.source_hint] || d.last_judgment.source_hint) : '';
      document.getElementById('ambStatusLast').textContent = d.last_judgment.method + ': ' + d.last_judgment.result + intervention + source;
    } else {
      document.getElementById('ambStatusLast').textContent = '-';
    }
    document.querySelectorAll('#reactivityBtns button').forEach((btn, i) => {
      btn.classList.toggle('active', i + 1 === d.reactivity);
    });
  }
  if (msg.type === 'ambient_log') {
    const log = document.getElementById('ambientLog');
    const d = msg.data;
    const sourceLabel = {
      user_identified: '本人(声紋一致)',
      user_initiative: '本人(呼びかけ)',
      user_response: '本人(会話継続)',
      user_likely: '本人らしい',
      user_in_conversation: '複数人会話',
      media_likely: 'メディア音声',
      fragmentary: '断片/ノイズ',
      unknown: '不明',
    };
    const interventionLabel = {
      reply: '返答',
      backchannel: '相槌',
      skip: '見守り',
    };
    const cls = d.result === 'speak' ? 'result-speak' : 'result-skip';
    const intervention = d.intervention || (d.result === 'skip' ? 'skip' : '');
    const interventionCls = 'intervention-' + intervention;
    const interventionText = intervention ? ' [' + (interventionLabel[intervention] || intervention) + ']' : '';
    const sourceText = d.source_hint ? ' {' + (sourceLabel[d.source_hint] || d.source_hint) + '}' : '';
    const extra = (d.utterance ? ' \u2192 ' + d.utterance : (d.keyword ? ' (' + d.keyword + ')' : '')) + sourceText;
    const entry = document.createElement('div');
    entry.className = 'ambient-log-entry';
    entry.innerHTML = '<span class="time">' + d.timestamp + '</span> <span class="method">' + d.method + '</span> <span class="' + cls + '">' + d.result + '</span> <span class="' + interventionCls + '">' + interventionText + '</span>' + extra;
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
    while (log.children.length > 20) log.removeChild(log.firstChild);
  }
  if (msg.type === 'ambient_response') {
    addMessage(msg.text, 'assistant');
  }
}
</script>
