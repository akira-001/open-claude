<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1a1a2e;
    color: #eee;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.5;
    font-size: 15px;
  }
  .msg.user {
    align-self: flex-end;
    background: #0f3460;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #16213e;
    border-bottom-left-radius: 4px;
  }
  .msg.status {
    align-self: center;
    background: none;
    color: #888;
    font-size: 13px;
    padding: 4px;
  }
  #controls {
    padding: 20px;
    display: flex;
    justify-content: center;
    gap: 12px;
    align-items: center;
    background: #16213e;
  }
  #talkBtn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid #e94560;
    background: transparent;
    color: #e94560;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    -webkit-user-select: none;
  }
  #talkBtn:hover { background: rgba(233, 69, 96, 0.1); }
  #talkBtn.recording {
    background: #e94560;
    color: #fff;
    animation: pulse 1s infinite;
  }
  #talkBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  #ttsToggle {
    background: none;
    border: 1px solid #555;
    color: #aaa;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }
  #ttsToggle.on { border-color: #0f3460; color: #7ec8e3; }
</style>
</head>
<body>

<div id="chat"></div>

<div id="controls">
  <button id="ttsToggle" class="on" onclick="toggleTTS()">TTS ON</button>
  <button id="talkBtn">TALK</button>
</div>

<script>
const chat = document.getElementById('chat');
const talkBtn = document.getElementById('talkBtn');
const ttsToggle = document.getElementById('ttsToggle');

let ws = null;
let mediaRecorder = null;
let audioChunks = [];
let ttsEnabled = true;
let speaking = false;

function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.binaryType = 'arraybuffer';

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'status') {
      addMessage(msg.text, 'status');
    } else if (msg.type === 'user_text') {
      addMessage(msg.text, 'user');
    } else if (msg.type === 'assistant_text') {
      addMessage(msg.text, 'assistant');
      if (ttsEnabled) speak(msg.text);
      talkBtn.disabled = false;
    }
  };

  ws.onclose = () => setTimeout(connect, 2000);
}

function addMessage(text, type) {
  // status は前のを消す
  if (type === 'status') {
    const prev = chat.querySelector('.msg.status');
    if (prev) prev.remove();
  }
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  speaking = true;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  // 日本語ボイスを選択
  const voices = speechSynthesis.getVoices();
  const jaVoice = voices.find(v => v.lang.startsWith('ja'));
  if (jaVoice) u.voice = jaVoice;
  u.rate = 1.1;
  u.onend = () => { speaking = false; };
  speechSynthesis.speak(u);
}

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  ttsToggle.textContent = ttsEnabled ? 'TTS ON' : 'TTS OFF';
  ttsToggle.className = ttsEnabled ? 'on' : '';
  if (!ttsEnabled) speechSynthesis.cancel();
}

async function startRecording() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  audioChunks = [];
  mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });

  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) audioChunks.push(e.data);
  };

  mediaRecorder.onstop = async () => {
    stream.getTracks().forEach(t => t.stop());
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    const buf = await blob.arrayBuffer();
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(buf);
    }
  };

  mediaRecorder.start();
  talkBtn.classList.add('recording');
  talkBtn.textContent = '...';
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    talkBtn.classList.remove('recording');
    talkBtn.textContent = 'TALK';
    talkBtn.disabled = true;
  }
}

// Push-to-talk (hold)
talkBtn.addEventListener('mousedown', (e) => { e.preventDefault(); startRecording(); });
talkBtn.addEventListener('mouseup', stopRecording);
talkBtn.addEventListener('mouseleave', stopRecording);
talkBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
talkBtn.addEventListener('touchend', stopRecording);

// 初期化
speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
connect();
</script>

</body>
</html>
