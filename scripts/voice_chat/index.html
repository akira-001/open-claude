<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1a1a2e;
    color: #eee;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.5;
    font-size: 15px;
  }
  .msg.user {
    align-self: flex-end;
    background: #0f3460;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #16213e;
    border-bottom-left-radius: 4px;
  }
  .msg.status {
    align-self: center;
    background: none;
    color: #888;
    font-size: 13px;
    padding: 4px;
  }
  #controls {
    padding: 16px 20px;
    display: flex;
    justify-content: center;
    gap: 12px;
    align-items: center;
    background: #16213e;
    flex-wrap: wrap;
  }
  #talkBtn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid #e94560;
    background: transparent;
    color: #e94560;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    -webkit-user-select: none;
  }
  #talkBtn:hover { background: rgba(233, 69, 96, 0.1); }
  #talkBtn.recording {
    background: #e94560;
    color: #fff;
    animation: pulse 1s infinite;
  }
  #talkBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  .side-btn {
    background: none;
    border: 1px solid #555;
    color: #aaa;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }
  .side-btn.on { border-color: #0f3460; color: #7ec8e3; }
  #voiceSelect {
    background: #0d1b2a;
    color: #aaa;
    border: 1px solid #555;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    max-width: 160px;
  }
  #voiceSelect:focus { border-color: #0f3460; color: #7ec8e3; outline: none; }
</style>
</head>
<body>

<div id="chat"></div>

<div id="controls">
  <select id="voiceSelect"></select>
  <button id="talkBtn">TALK</button>
  <button id="ttsToggle" class="side-btn on" onclick="toggleTTS()">TTS ON</button>
</div>

<script>
const chat = document.getElementById('chat');
const talkBtn = document.getElementById('talkBtn');
const ttsToggle = document.getElementById('ttsToggle');
const voiceSelect = document.getElementById('voiceSelect');

let ws = null;
let micStream = null;
let mediaRecorder = null;
let audioChunks = [];
let recording = false;
let processing = false;
let ttsEnabled = true;

// マイクを初回のみ取得して使い回す
async function getMicStream() {
  if (!micStream || !micStream.active) {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  }
  return micStream;
}

function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.binaryType = 'arraybuffer';

  ws.onmessage = (e) => {
    if (e.data instanceof ArrayBuffer) {
      if (ttsEnabled) playAudio(e.data);
      processing = false;
      talkBtn.disabled = false;
      talkBtn.textContent = 'TALK';
      return;
    }

    const msg = JSON.parse(e.data);
    if (msg.type === 'status') {
      addMessage(msg.text, 'status');
    } else if (msg.type === 'user_text') {
      addMessage(msg.text, 'user');
    } else if (msg.type === 'assistant_text') {
      addMessage(msg.text, 'assistant');
      if (msg.tts_fallback) {
        if (ttsEnabled) speak(msg.text);
        processing = false;
        talkBtn.disabled = false;
        talkBtn.textContent = 'TALK';
      }
    }
  };

  ws.onclose = () => setTimeout(connect, 2000);
}

function playAudio(arrayBuffer) {
  const blob = new Blob([arrayBuffer], { type: 'audio/wav' });
  const url = URL.createObjectURL(blob);
  const audio = new Audio(url);
  audio.onended = () => URL.revokeObjectURL(url);
  audio.play();
}

function addMessage(text, type) {
  if (type === 'status') {
    const prev = chat.querySelector('.msg.status');
    if (prev) prev.remove();
  }
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  const voices = speechSynthesis.getVoices();
  const jaVoice = voices.find(v => v.lang.startsWith('ja'));
  if (jaVoice) u.voice = jaVoice;
  u.rate = 1.1;
  speechSynthesis.speak(u);
}

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  ttsToggle.textContent = ttsEnabled ? 'TTS ON' : 'TTS OFF';
  ttsToggle.className = ttsEnabled ? 'side-btn on' : 'side-btn';
  if (!ttsEnabled) speechSynthesis.cancel();
}

async function startRecording() {
  const stream = await getMicStream();
  audioChunks = [];
  mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });

  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) audioChunks.push(e.data);
  };

  mediaRecorder.onstop = async () => {
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    const buf = await blob.arrayBuffer();
    if (ws && ws.readyState === WebSocket.OPEN) {
      processing = true;
      talkBtn.disabled = true;
      talkBtn.textContent = '...';
      ws.send(buf);
    }
  };

  mediaRecorder.start();
  recording = true;
  talkBtn.classList.add('recording');
  talkBtn.textContent = 'STOP';
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    recording = false;
    talkBtn.classList.remove('recording');
  }
}

// Toggle recording on click
talkBtn.addEventListener('click', (e) => {
  e.preventDefault();
  if (processing) return;
  if (recording) {
    stopRecording();
  } else {
    startRecording();
  }
});

// 音声切り替え
voiceSelect.addEventListener('change', () => {
  const id = parseInt(voiceSelect.value);
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'set_speaker', speaker_id: id }));
  }
});

// スピーカー一覧を取得
async function loadSpeakers() {
  const resp = await fetch('/api/speakers');
  const speakers = await resp.json();
  voiceSelect.innerHTML = '';
  for (const s of speakers) {
    for (const st of s.styles) {
      const opt = document.createElement('option');
      opt.value = st.id;
      opt.textContent = `${s.name} - ${st.name}`;
      if (st.id === 2) opt.selected = true;
      voiceSelect.appendChild(opt);
    }
  }
}

// 初期化
speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
loadSpeakers();
connect();
</script>

</body>
</html>
