<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ember Chat</title>
<style>
  :root {
    --ember-bg: #141820;
    --ember-surface: #1e2430;
    --ember-surface-alt: #1a2028;
    --ember-primary: #f97316;
    --ember-primary-hover: #ea580c;
    --ember-primary-glow: rgba(249, 115, 22, 0.12);
    --ember-primary-dim: rgba(249, 115, 22, 0.06);
    --ember-warm: #fbbf24;
    --ember-warm-glow: rgba(251, 191, 36, 0.10);
    --ember-text: #f0ece5;
    --ember-text-muted: #a09aae;
    --ember-text-dim: #6b6478;
    --ember-border: #283040;
    --ember-input-bg: #101418;
    --ember-success: #22c55e;
    --ember-danger: #ef4444;
    --ember-gradient: linear-gradient(135deg, #f97316, #fb923c);
    --titlebar-height: 38px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', sans-serif;
    background: var(--ember-bg);
    color: var(--ember-text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Titlebar (draggable) */
  #titlebar {
    -webkit-app-region: drag;
    height: var(--titlebar-height);
    background: var(--ember-surface);
    border-bottom: 1px solid var(--ember-border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
  }
  #titlebar .logo {
    display: flex;
    align-items: center;
    gap: 2px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--ember-primary);
  }
  #titlebar .logo-icon {
    width: 24px;
    height: 20px;
    flex-shrink: 0;
  }

  /* Server status */
  #serverStatus {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 6px 16px;
    background: var(--ember-surface-alt);
    border-bottom: 1px solid var(--ember-border);
    flex-shrink: 0;
    font-size: 11px;
  }
  .srv-item {
    display: flex;
    align-items: center;
    gap: 5px;
    color: var(--ember-text-dim);
  }
  .srv-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--ember-danger);
    transition: background 0.3s;
  }
  .srv-dot.online { background: var(--ember-success); }

  /* Chat */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: thin;
    scrollbar-color: var(--ember-border) transparent;
  }
  #chat::-webkit-scrollbar { width: 5px; }
  #chat::-webkit-scrollbar-thumb { background: var(--ember-border); border-radius: 3px; }
  #emptyState {
    margin: auto;
    text-align: center;
    color: var(--ember-text-dim);
  }
  .empty-icon {
    font-size: 40px;
    margin-bottom: 10px;
    opacity: 0.5;
  }
  #emptyState p {
    font-size: 13px;
    line-height: 1.6;
  }
  .msg {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 14px;
    line-height: 1.55;
    font-size: 14px;
    word-break: break-word;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #3a2040, #2d1a38);
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--ember-surface);
    border: 1px solid var(--ember-border);
    border-bottom-left-radius: 4px;
  }
  .msg.assistant .bot-tag {
    font-size: 11px;
    font-weight: 600;
    color: var(--ember-primary);
    margin-bottom: 4px;
  }
  .msg.status {
    align-self: center;
    background: none;
    color: var(--ember-text-dim);
    font-size: 12px;
    padding: 2px;
  }

  /* Controls area */
  #toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 14px;
    background: var(--ember-surface);
    border-top: 1px solid var(--ember-border);
    align-items: center;
  }
  .toolbar-label {
    color: var(--ember-text-dim);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  select {
    background: var(--ember-input-bg);
    color: var(--ember-text-muted);
    border: 1px solid var(--ember-border);
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 12px;
    outline: none;
    max-width: 140px;
    transition: border-color 0.15s;
  }
  select:focus { border-color: var(--ember-primary); color: var(--ember-text); }

  /* Bot rows */
  .bot-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--ember-surface);
    border-bottom: 1px solid var(--ember-border);
  }
  .bot-row .bot-name {
    color: var(--ember-primary);
    font-size: 12px;
    font-weight: 700;
    min-width: 28px;
  }
  .bot-row select {
    font-size: 11px;
    padding: 5px 6px;
  }
  .bot-row .bot-play {
    background: none;
    border: 1px solid var(--ember-primary);
    color: var(--ember-primary);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    transition: all 0.15s;
  }
  .bot-row .bot-play:hover { background: var(--ember-primary-glow); }
  .bot-row .bot-play:disabled { opacity: 0.4; }

  /* Main controls */
  #controls {
    padding: 12px 14px;
    display: flex;
    justify-content: center;
    gap: 10px;
    align-items: center;
    background: var(--ember-surface);
    flex-wrap: wrap;
  }
  .side-btn {
    background: none;
    border: 1px solid var(--ember-border);
    color: var(--ember-text-muted);
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
    -webkit-app-region: no-drag;
  }
  .side-btn:hover { border-color: var(--ember-text-muted); color: var(--ember-text); }
  .side-btn.on { border-color: var(--ember-primary); color: var(--ember-primary); }
  .side-btn.proactive-on { border-color: var(--ember-success); color: var(--ember-success); }
  .side-btn.reply-on { border-color: var(--ember-primary); color: var(--ember-primary); }

  #talkBtn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 3px solid var(--ember-primary);
    background: transparent;
    color: var(--ember-primary);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    -webkit-user-select: none;
    -webkit-app-region: no-drag;
    letter-spacing: 0.02em;
  }
  #talkBtn:hover { background: var(--ember-primary-glow); }
  #talkBtn.recording {
    background: var(--ember-primary);
    color: #fff;
    animation: pulse 1s infinite;
  }
  #talkBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  #talkBtn.reply-mode { border-color: var(--ember-warm); color: var(--ember-warm); }
  #talkBtn.reply-mode:hover { background: var(--ember-warm-glow); }
  #talkBtn.reply-mode.recording { background: var(--ember-warm); color: #fff; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  /* Text input */
  #textInputRow {
    display: flex;
    gap: 8px;
    padding: 10px 14px;
    background: var(--ember-surface);
    border-top: 1px solid var(--ember-border);
  }
  #textInput {
    flex: 1;
    background: var(--ember-input-bg);
    color: var(--ember-text);
    border: 1px solid var(--ember-border);
    padding: 10px 14px;
    border-radius: 20px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-app-region: no-drag;
  }
  #textInput:focus { border-color: var(--ember-primary); }
  #textInput::placeholder { color: var(--ember-text-dim); }
  #sendBtn {
    background: var(--ember-gradient);
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
    -webkit-app-region: no-drag;
  }
  #sendBtn:hover { opacity: 0.9; }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Audio playback mode indicator */
  #playbackMode {
    font-size: 10px;
    color: var(--ember-text-dim);
    text-align: center;
    padding: 3px;
    background: var(--ember-surface-alt);
    border-bottom: 1px solid var(--ember-border);
  }
  #playbackMode .native { color: var(--ember-success); }

  /* Always-On indicator */
  #alwaysOnIndicator { cursor: pointer; }
  #alwaysOnDot.listening {
    background: var(--ember-success);
    animation: pulse-green 2s ease-in-out infinite;
  }
  #alwaysOnDot.processing {
    background: var(--ember-warm);
    animation: pulse-warm 1s ease-in-out infinite;
  }
  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
    50% { box-shadow: 0 0 0 4px rgba(34, 197, 94, 0); }
  }
  @keyframes pulse-warm {
    0%, 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); }
    50% { box-shadow: 0 0 0 4px rgba(251, 191, 36, 0); }
  }
</style>
</head>
<body>

<div id="consentOverlay" style="display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.85); align-items:center; justify-content:center;">
  <div style="background:var(--ember-surface); border-radius:16px; padding:32px; max-width:360px; text-align:center;">
    <div style="font-size:32px; margin-bottom:16px;">&#x1F399;</div>
    <h2 style="font-size:16px; margin-bottom:12px; color:var(--ember-text);">Always-On Listening</h2>
    <p style="font-size:13px; color:var(--ember-text-muted); line-height:1.6; margin-bottom:20px;">
      Ember Chat は常時マイクを使用して音声を監視します。<br>
      音声はローカルでのみ処理され、外部に送信されません。
    </p>
    <button id="consentAccept" style="background:var(--ember-gradient); color:#fff; border:none; border-radius:8px; padding:10px 24px; font-size:14px; cursor:pointer; margin-right:8px;">許可する</button>
    <button id="consentDecline" style="background:var(--ember-border); color:var(--ember-text-muted); border:none; border-radius:8px; padding:10px 24px; font-size:14px; cursor:pointer;">後で</button>
  </div>
</div>

<div id="titlebar">
  <div class="logo">
    <svg class="logo-icon" viewBox="56 20 144 212" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lo" x1="0.5" y1="1" x2="0.5" y2="0"><stop offset="0%" stop-color="#dc2626"/><stop offset="40%" stop-color="#ea580c"/><stop offset="70%" stop-color="#f97316"/><stop offset="100%" stop-color="#fb923c"/></linearGradient>
        <linearGradient id="lm" x1="0.5" y1="1" x2="0.5" y2="0"><stop offset="0%" stop-color="#ea580c"/><stop offset="50%" stop-color="#f97316"/><stop offset="100%" stop-color="#fdba74"/></linearGradient>
        <linearGradient id="li" x1="0.5" y1="1" x2="0.5" y2="0"><stop offset="0%" stop-color="#f97316"/><stop offset="40%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#fde68a"/></linearGradient>
        <linearGradient id="lc" x1="0.5" y1="1" x2="0.5" y2="0"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#fef3c7"/></linearGradient>
      </defs>
      <path d="M128 28C128 28 188 80 192 140C194 165 182 192 164 208C158 213 148 220 128 224C108 220 98 213 92 208C74 192 62 165 64 140C68 80 128 28 128 28Z" fill="url(#lo)"/>
      <path d="M128 60C128 60 172 104 174 148C175 168 166 190 152 204C144 210 136 216 128 218C120 216 112 210 104 204C90 190 81 168 82 148C84 104 128 60 128 60Z" fill="url(#lm)"/>
      <path d="M128 96C128 96 158 128 160 158C161 172 154 190 144 200C140 204 134 208 128 210C122 208 116 204 112 200C102 190 95 172 96 158C98 128 128 96 128 96Z" fill="url(#li)"/>
      <path d="M128 140C128 140 146 158 146 174C146 184 140 196 134 202C132 204 130 206 128 206C126 206 124 204 122 202C116 196 110 184 110 174C110 158 128 140 128 140Z" fill="url(#lc)"/>
    </svg>
    EMBER CHAT
  </div>
</div>

<div id="serverStatus">
  <span class="srv-item">
    <span id="srvWhisperDot" class="srv-dot"></span>
    <span>Whisper</span>
  </span>
  <span class="srv-item">
    <span id="srvVoicevoxDot" class="srv-dot"></span>
    <span>VOICEVOX</span>
  </span>
  <span class="srv-item">
    <span id="srvOllamaDot" class="srv-dot"></span>
    <span>Ollama</span>
  </span>
  <span class="srv-item" id="alwaysOnIndicator" style="margin-left:auto; cursor:pointer;" title="Toggle Always-On Listening">
    <span id="alwaysOnDot" class="srv-dot"></span>
    <span id="alwaysOnLabel">Muted</span>
  </span>
  <span class="srv-item">
    <span id="wsStatusDot" class="srv-dot"></span>
    <span>WS</span>
  </span>
</div>

<div id="playbackMode">Audio: <span id="playbackLabel" class="native">Native (afplay)</span></div>

<div id="chat">
  <div id="emptyState">
    <div class="empty-icon">&#x1F525;</div>
    <p>Voice or text, your call.</p>
  </div>
</div>

<div id="toolbar">
  <span class="toolbar-label">Model</span>
  <select id="modelSelect"></select>
  <span class="toolbar-label">TTS</span>
  <select id="ttsEngineSelect">
    <option value="voicevox">VOICEVOX</option>
    <option value="irodori">Irodori</option>
  </select>
  <span class="toolbar-label">Voice</span>
  <select id="voiceSelect"></select>
  <span class="toolbar-label">Speed</span>
  <select id="speedSelect">
    <option value="0.8">0.8x</option>
    <option value="1.0">1.0x</option>
    <option value="1.2">1.2x</option>
    <option value="1.5">1.5x</option>
    <option value="2.0">2.0x</option>
  </select>
</div>
<div class="bot-row">
  <span class="bot-name">Mei</span>
  <select id="meiVoice" class="bot-voice-select"></select>
  <select id="meiSpeed">
    <option value="0.8">0.8x</option>
    <option value="1.0">1.0x</option>
    <option value="1.2">1.2x</option>
    <option value="1.5">1.5x</option>
    <option value="2.0">2.0x</option>
  </select>
  <button class="bot-play" onclick="playBotMessage('mei')">Play</button>
</div>
<div class="bot-row">
  <span class="bot-name">Eve</span>
  <select id="eveVoice" class="bot-voice-select"></select>
  <select id="eveSpeed">
    <option value="0.8">0.8x</option>
    <option value="1.0">1.0x</option>
    <option value="1.2">1.2x</option>
    <option value="1.5">1.5x</option>
    <option value="2.0">2.0x</option>
  </select>
  <button class="bot-play" onclick="playBotMessage('eve')">Play</button>
</div>
<div id="controls">
  <button id="stopBtn" class="side-btn" onclick="stopAudio()">Stop</button>
  <button id="proactiveBtn" class="side-btn" onclick="toggleProactive()">Proactive OFF</button>
  <button id="replyBtn" class="side-btn" onclick="toggleReply()" style="display:none">Reply</button>
  <button id="previewBtn" class="side-btn" onclick="previewVoice()">Preview</button>
  <button id="talkBtn">TALK</button>
  <button id="ttsToggle" class="side-btn on" onclick="toggleTTS()">TTS ON</button>
</div>
<div id="textInputRow">
  <input type="text" id="textInput" placeholder="Type a message..." autocomplete="off">
  <button id="sendBtn" onclick="sendTextMessage()">Send</button>
</div>

<script src="always-on.js"></script>
<script>
const API_BASE = 'http://localhost:8767/api';
const WS_HOST = 'localhost:8767';

const chat = document.getElementById('chat');
const talkBtn = document.getElementById('talkBtn');
const ttsToggle = document.getElementById('ttsToggle');
const voiceSelect = document.getElementById('voiceSelect');
const modelSelect = document.getElementById('modelSelect');
const speedSelect = document.getElementById('speedSelect');
const proactiveBtn = document.getElementById('proactiveBtn');
const ttsEngineSelect = document.getElementById('ttsEngineSelect');
const wsStatusDot = document.getElementById('wsStatusDot');

let ws = null;
let micStream = null;
let mediaRecorder = null;
let audioChunks = [];
let recording = false;
let processing = false;
let ttsEnabled = true;
let proactiveEnabled = false;
let lastSeen = { mei: '', eve: '' };
let audioQueue = [];
let isPlaying = false;
let lastBotId = null;
let replyMode = false;
let playedMessageIds = new Set();
let useNativeAudio = !!window.emberBridge;

const _bc = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel('ember-audio') : null;
if (_bc) {
  _bc.onmessage = (e) => {
    if (e.data?.type === 'played') playedMessageIds.add(e.data.id);
  };
}

let _syncing = false;
let _lastSaveTime = 0;

function getSettingsSnapshot() {
  return {
    ttsEngine: ttsEngineSelect.value,
    voiceSelect: voiceSelect.value,
    modelSelect: modelSelect.value,
    speedSelect: speedSelect.value,
    meiVoice: document.getElementById('meiVoice').value,
    meiSpeed: document.getElementById('meiSpeed').value,
    eveVoice: document.getElementById('eveVoice').value,
    eveSpeed: document.getElementById('eveSpeed').value,
    ttsEnabled,
    proactiveEnabled,
    lastSeen,
  };
}

function saveSettings() {
  if (_syncing) return;
  _lastSaveTime = Date.now();
  wsSend({ type: 'update_settings', settings: getSettingsSnapshot() });
}

async function applySettings(settings) {
  if (!settings) return;
  if (Date.now() - _lastSaveTime < 500) return;
  _syncing = true;
  if (settings.ttsEngine && ttsEngineSelect.value !== settings.ttsEngine) {
    ttsEngineSelect.value = settings.ttsEngine;
    await loadSpeakers(settings.ttsEngine, settings);
  }
  if (settings.voiceSelect && voiceSelect.value !== String(settings.voiceSelect)) voiceSelect.value = settings.voiceSelect;
  if (settings.modelSelect && modelSelect.value !== settings.modelSelect) modelSelect.value = settings.modelSelect;
  if (settings.speedSelect && speedSelect.value !== String(settings.speedSelect)) speedSelect.value = settings.speedSelect;
  if (settings.meiVoice) document.getElementById('meiVoice').value = settings.meiVoice;
  if (settings.meiSpeed) document.getElementById('meiSpeed').value = settings.meiSpeed;
  if (settings.eveVoice) document.getElementById('eveVoice').value = settings.eveVoice;
  if (settings.eveSpeed) document.getElementById('eveSpeed').value = settings.eveSpeed;
  if (settings.ttsEnabled !== undefined) {
    ttsEnabled = settings.ttsEnabled;
    ttsToggle.textContent = ttsEnabled ? 'TTS ON' : 'TTS OFF';
    ttsToggle.className = ttsEnabled ? 'side-btn on' : 'side-btn';
  }
  if (settings.lastSeen) lastSeen = settings.lastSeen;
  if (settings.proactiveEnabled !== undefined) {
    proactiveEnabled = settings.proactiveEnabled;
    proactiveBtn.textContent = proactiveEnabled ? 'Proactive ON' : 'Proactive OFF';
    proactiveBtn.className = proactiveEnabled ? 'side-btn proactive-on' : 'side-btn';
  }
  _syncing = false;
}

function autoSave() {
  document.querySelectorAll('select').forEach(el => el.addEventListener('change', saveSettings));
}

// --- Server status ---
async function checkServerStatus() {
  try {
    const res = await fetch('http://localhost:3456/api/local-models/server-status');
    if (!res.ok) throw new Error();
    const data = await res.json();
    updateSrvUI('Whisper', data.whisper?.running ?? false);
    updateSrvUI('Voicevox', data.voicevox?.running ?? false);
    updateSrvUI('Ollama', data.ollama?.running ?? false);
  } catch {
    // Dashboard unreachable — check each service directly
    await Promise.allSettled([
      fetch('http://localhost:8767/', { signal: AbortSignal.timeout(2000) })
        .then(r => updateSrvUI('Whisper', true)).catch(() => updateSrvUI('Whisper', false)),
      fetch('http://localhost:50021/version', { signal: AbortSignal.timeout(2000) })
        .then(r => updateSrvUI('Voicevox', true)).catch(() => updateSrvUI('Voicevox', false)),
      fetch('http://localhost:11434/api/tags', { signal: AbortSignal.timeout(2000) })
        .then(r => updateSrvUI('Ollama', true)).catch(() => updateSrvUI('Ollama', false)),
    ]);
  }
}

function updateSrvUI(name, running) {
  const dot = document.getElementById(`srv${name}Dot`);
  if (dot) dot.classList.toggle('online', running);
}

checkServerStatus();
setInterval(checkServerStatus, 10000);

// --- Text input ---
const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');

function sendTextMessage() {
  const text = textInput.value.trim();
  if (!text || processing) return;
  if (replyMode && lastBotId) {
    const speaker = document.getElementById(`${lastBotId}Voice`).value;
    const speed = document.getElementById(`${lastBotId}Speed`).value;
    wsSend({ type: 'slack_reply', bot_id: lastBotId, speaker_id: parseInt(speaker), speed: parseFloat(speed) });
  }
  wsSend({ type: 'text_message', text });
  textInput.value = '';
  processing = true;
  talkBtn.disabled = true;
  sendBtn.disabled = true;
}

textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.isComposing) { e.preventDefault(); sendTextMessage(); }
});

// --- Mic ---
async function getMicStream() {
  if (!micStream || !micStream.active) micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  return micStream;
}

// --- WebSocket ---
function connect() {
  ws = new WebSocket(`ws://${WS_HOST}/ws`);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => {
    wsStatusDot.classList.add('online');
    if (!alwaysOn) maybeStartAlwaysOn();
  };
  ws.onclose = () => { wsStatusDot.classList.remove('online'); setTimeout(connect, 2000); };

  ws.onmessage = async (e) => {
    if (e.data instanceof ArrayBuffer) {
      const statusEl = chat.querySelector('.msg.status');
      if (statusEl) statusEl.remove();
      if (ttsEnabled) playAudio(e.data);
      processing = false;
      talkBtn.disabled = false;
      sendBtn.disabled = false;
      updateTalkBtn();
      if (alwaysOn) alwaysOn.returnToListening();
      return;
    }
    const msg = JSON.parse(e.data);
    if (msg.type === 'stop_audio') { stopAudio(false); return; }
    if (msg.type === 'wake_detected') {
      if (alwaysOn) alwaysOn.handleServerMessage(msg);
      return;
    }
    if (msg.type === 'proactive_message') {
      const msgId = msg.ts || `${msg.botId}-${msg.text}`;
      if (playedMessageIds.has(msgId)) return;
      playedMessageIds.add(msgId);
      if (_bc) _bc.postMessage({ type: 'played', id: msgId });
      if (playedMessageIds.size > 100) playedMessageIds = new Set([...playedMessageIds].slice(-50));
      handleProactiveMessage(msg.botId, msg.text, msg.speaker, msg.speed);
      return;
    }
    if (msg.type === 'sync_settings') {
      await applySettings(msg.settings);
      const vid = msg.settings.voiceSelect;
      if (vid) wsSend({ type: 'set_speaker', speaker_id: /^\d+$/.test(vid) ? parseInt(vid) : vid });
      if (msg.settings.speedSelect) wsSend({ type: 'set_speed', speed: parseFloat(msg.settings.speedSelect) });
      if (msg.settings.modelSelect) wsSend({ type: 'set_model', model: msg.settings.modelSelect });
      return;
    }
    if (msg.type === 'status') addMessage(msg.text, 'status');
    else if (msg.type === 'user_text') addMessage(msg.text, 'user');
    else if (msg.type === 'assistant_text') {
      addMessage(msg.text, 'assistant');
      if (msg.tts_fallback) {
        if (ttsEnabled) speak(msg.text);
        processing = false;
        talkBtn.disabled = false;
        updateTalkBtn();
      }
    } else if (msg.type === 'reply_ended') {
      if (msg.bot_id && msg.reply_ts) { lastSeen[msg.bot_id] = msg.reply_ts; saveSettings(); }
      replyMode = false;
      updateReplyUI();
      processing = false;
      talkBtn.disabled = false;
      sendBtn.disabled = false;
      updateTalkBtn();
    }
  };
}

function wsSend(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

// --- Audio playback (native afplay for background support) ---
let audioCtx = null;
let currentSource = null;

function getAudioContext() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

async function playAudio(arrayBuffer) {
  audioQueue.push(arrayBuffer);
  processQueue();
}

async function processQueue() {
  if (isPlaying || audioQueue.length === 0) return;
  isPlaying = true;
  const buf = audioQueue.shift();

  if (useNativeAudio && window.emberBridge) {
    try {
      await window.emberBridge.playAudioNative(buf);
    } catch (err) {
      console.error('Native audio failed, falling back to WebAudio:', err);
    }
    isPlaying = false;
    processQueue();
    return;
  }

  const ctx = getAudioContext();
  ctx.decodeAudioData(buf.slice(0), (audioBuffer) => {
    const source = ctx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(ctx.destination);
    currentSource = source;
    source.onended = () => { currentSource = null; isPlaying = false; processQueue(); };
    source.start(0);
  }, (err) => {
    console.error('decodeAudioData error:', err);
    currentSource = null;
    isPlaying = false;
    processQueue();
  });
}

function stopAudio(broadcast = true) {
  audioQueue.length = 0;
  if (useNativeAudio && window.emberBridge) {
    window.emberBridge.stopAudioNative();
  }
  if (currentSource) {
    try { currentSource.stop(); } catch {}
    currentSource = null;
  }
  isPlaying = false;
  if (broadcast) wsSend({ type: 'stop_audio' });
}

document.addEventListener('click', () => getAudioContext(), { once: true });

// --- UI ---
function addMessage(text, type) {
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();
  if (type === 'status') {
    const prev = chat.querySelector('.msg.status');
    if (prev) prev.remove();
  }
  const div = document.createElement('div');
  div.className = `msg ${type}`;

  if (type === 'assistant' && text.startsWith('[')) {
    const match = text.match(/^\[(\w+)\]\s*/);
    if (match) {
      const tag = document.createElement('div');
      tag.className = 'bot-tag';
      tag.textContent = match[1].toUpperCase();
      div.appendChild(tag);
      const content = document.createTextNode(text.slice(match[0].length));
      div.appendChild(content);
    } else {
      div.textContent = text;
    }
  } else {
    div.textContent = text;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  const voices = speechSynthesis.getVoices();
  const jaVoice = voices.find(v => v.lang.startsWith('ja'));
  if (jaVoice) u.voice = jaVoice;
  u.rate = 1.1;
  speechSynthesis.speak(u);
}

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  ttsToggle.textContent = ttsEnabled ? 'TTS ON' : 'TTS OFF';
  ttsToggle.className = ttsEnabled ? 'side-btn on' : 'side-btn';
  if (!ttsEnabled) speechSynthesis.cancel();
  saveSettings();
}

// --- Recording ---
async function startRecording() {
  const stream = await getMicStream();
  audioChunks = [];
  mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
  mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    const buf = await blob.arrayBuffer();
    if (ws && ws.readyState === WebSocket.OPEN) {
      if (replyMode && lastBotId) {
        const speaker = document.getElementById(`${lastBotId}Voice`).value;
        const speed = document.getElementById(`${lastBotId}Speed`).value;
        wsSend({ type: 'slack_reply', bot_id: lastBotId, speaker_id: parseInt(speaker), speed: parseFloat(speed) });
      }
      processing = true;
      talkBtn.disabled = true;
      talkBtn.textContent = '...';
      ws.send(buf);
    }
  };
  mediaRecorder.start();
  recording = true;
  talkBtn.classList.add('recording');
  talkBtn.textContent = 'STOP';
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    recording = false;
    talkBtn.classList.remove('recording');
  }
}

talkBtn.addEventListener('click', (e) => {
  e.preventDefault();
  if (processing) return;
  recording ? stopRecording() : startRecording();
});

// --- Voice/model selectors ---
voiceSelect.addEventListener('change', () => {
  const vid = voiceSelect.value;
  wsSend({ type: 'set_speaker', speaker_id: /^\d+$/.test(vid) ? parseInt(vid) : vid });
  saveSettings();
});
speedSelect.addEventListener('change', () => {
  wsSend({ type: 'set_speed', speed: parseFloat(speedSelect.value) });
  saveSettings();
});
modelSelect.addEventListener('change', () => {
  wsSend({ type: 'set_model', model: modelSelect.value });
  saveSettings();
});

// --- Bot message playback ---
async function playBotMessage(botId) {
  const btns = document.querySelectorAll('.bot-play');
  btns.forEach(b => b.disabled = true);
  try {
    const textResp = await fetch(`${API_BASE}/bot-text/${botId}`);
    if (!textResp.ok) {
      addMessage(`[${botId}] No message found`, 'status');
      btns.forEach(b => b.disabled = false);
      return;
    }
    const { text, sentAt } = await textResp.json();
    addMessage(`[${botId}] ${text}`, 'assistant');
    lastSeen[botId] = sentAt;
    lastBotId = botId;
    updateReplyUI();
    saveSettings();
    const speaker = document.getElementById(`${botId}Voice`).value;
    const speed = document.getElementById(`${botId}Speed`).value;
    const audioResp = await fetch(`${API_BASE}/bot-audio/${botId}?speaker=${speaker}&speed=${speed}`);
    const buf = await audioResp.arrayBuffer();
    playAudio(buf);
  } catch (e) { console.error(e); }
  btns.forEach(b => b.disabled = false);
}

async function previewVoice() {
  const btn = document.getElementById('previewBtn');
  btn.disabled = true;
  btn.textContent = '...';
  try {
    const resp = await fetch(`${API_BASE}/preview?speaker=${voiceSelect.value}&speed=${speedSelect.value}`);
    const buf = await resp.arrayBuffer();
    playAudio(buf);
  } catch (e) { console.error(e); }
  btn.disabled = false;
  btn.textContent = 'Preview';
}

// --- Reply mode ---
const replyBtn = document.getElementById('replyBtn');

function updateReplyUI() {
  if (lastBotId) {
    replyBtn.style.display = '';
    replyBtn.textContent = replyMode ? `Reply ${lastBotId} ON` : `Reply ${lastBotId}`;
    replyBtn.className = replyMode ? 'side-btn reply-on' : 'side-btn';
  } else {
    replyBtn.style.display = 'none';
  }
  updateTalkBtn();
}

function updateTalkBtn() {
  if (replyMode) {
    talkBtn.textContent = 'REPLY';
    talkBtn.classList.add('reply-mode');
  } else {
    talkBtn.textContent = 'TALK';
    talkBtn.classList.remove('reply-mode');
  }
}

function toggleReply() {
  replyMode = !replyMode;
  if (replyMode && lastBotId) {
    const speaker = document.getElementById(`${lastBotId}Voice`).value;
    const speed = document.getElementById(`${lastBotId}Speed`).value;
    wsSend({ type: 'slack_reply', bot_id: lastBotId, speaker_id: parseInt(speaker), speed: parseFloat(speed) });
  } else {
    wsSend({ type: 'cancel_reply' });
  }
  updateReplyUI();
}

// --- Proactive mode ---
function toggleProactive() {
  proactiveEnabled = !proactiveEnabled;
  proactiveBtn.textContent = proactiveEnabled ? 'Proactive ON' : 'Proactive OFF';
  proactiveBtn.className = proactiveEnabled ? 'side-btn proactive-on' : 'side-btn';
  saveSettings();
}

async function handleProactiveMessage(botId, text, speaker, speed) {
  addMessage(`[${botId}] ${text}`, 'assistant');
  lastBotId = botId;
  lastSeen[botId] = String(Date.now() / 1000);
  updateReplyUI();
  // Audio is already delivered as WS binary frame right after this text message.
  // No need to fetch /tts again (was causing double playback).
}

// --- Load speakers/models ---
async function loadSpeakers(engine, savedSettings) {
  const eng = engine || ttsEngineSelect.value || 'voicevox';
  const resp = await fetch(`${API_BASE}/speakers?engine=${eng}`);
  const speakers = await resp.json();
  const isIrodori = eng === 'irodori';
  const selects = [
    { el: voiceSelect, key: 'voiceSelect', defaultId: isIrodori ? 'irodori-calm-female' : 2 },
    { el: document.getElementById('meiVoice'), key: 'meiVoice', defaultId: isIrodori ? 'irodori-calm-female' : 2 },
    { el: document.getElementById('eveVoice'), key: 'eveVoice', defaultId: isIrodori ? 'irodori-cool-female' : 13 },
  ];
  for (const { el, key, defaultId } of selects) {
    const savedId = savedSettings && savedSettings[key];
    const targetId = savedId != null ? savedId : defaultId;
    el.innerHTML = '';
    for (const s of speakers) {
      for (const st of s.styles) {
        const opt = document.createElement('option');
        opt.value = st.id;
        opt.textContent = `${s.name} - ${st.name}`;
        if (String(st.id) === String(targetId)) opt.selected = true;
        el.appendChild(opt);
      }
    }
  }
}

ttsEngineSelect.addEventListener('change', async () => {
  await loadSpeakers(ttsEngineSelect.value);
  saveSettings();
  wsSend({ type: 'update_settings', settings: { ttsEngine: ttsEngineSelect.value, voiceSelect: voiceSelect.value } });
});

async function loadModels() {
  const resp = await fetch(`${API_BASE}/models`);
  const models = await resp.json();
  modelSelect.innerHTML = '';
  for (const m of models) {
    const opt = document.createElement('option');
    opt.value = m.name;
    opt.textContent = `${m.name} (${m.size})`;
    if (m.name === 'gemma4:e4b') opt.selected = true;
    modelSelect.appendChild(opt);
  }
}

// --- Init ---
async function init() {
  if (!useNativeAudio) {
    document.getElementById('playbackLabel').textContent = 'WebAudio (browser)';
    document.getElementById('playbackLabel').classList.remove('native');
  }
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  let saved = {};
  try { const r = await fetch(`${API_BASE}/settings`); saved = await r.json(); } catch {}
  if (saved.ttsEngine) ttsEngineSelect.value = saved.ttsEngine;
  await loadSpeakers(saved.ttsEngine, saved);
  await loadModels();
  if (saved.modelSelect) modelSelect.value = saved.modelSelect;
  if (saved.speedSelect) speedSelect.value = saved.speedSelect;
  autoSave();
  connect();
}

init();

// --- Always-On Listener ---
let alwaysOn = null;

async function checkAndShowConsent() {
  if (!window.emberBridge?.checkConsent) return true;
  const consented = await window.emberBridge.checkConsent();
  if (consented) return true;
  return new Promise((resolve) => {
    const overlay = document.getElementById('consentOverlay');
    overlay.style.display = 'flex';
    document.getElementById('consentAccept').onclick = async () => {
      await window.emberBridge.saveConsent();
      overlay.style.display = 'none';
      resolve(true);
    };
    document.getElementById('consentDecline').onclick = () => {
      overlay.style.display = 'none';
      resolve(false);
    };
  });
}

function initAlwaysOn() {
  const dot = document.getElementById('alwaysOnDot');
  const label = document.getElementById('alwaysOnLabel');
  const indicator = document.getElementById('alwaysOnIndicator');

  alwaysOn = new AlwaysOnListener({
    wsSend,
    wsRef: () => ws,
    onStateChange: (state) => {
      dot.className = 'srv-dot';
      if (state === 'listening') {
        dot.classList.add('online', 'listening');
        label.textContent = 'Listening';
      } else if (state === 'processing' || state === 'detected') {
        dot.classList.add('processing');
        label.textContent = 'Processing...';
      } else {
        label.textContent = 'Muted';
      }
      if (window.emberBridge?.setAlwaysOn) {
        window.emberBridge.setAlwaysOn(state === 'listening' || state === 'detected' || state === 'processing');
      }
    },
    onWakeDetected: (msg) => {
      if (msg.response_text) addMessage(`[MEI] ${msg.response_text}`, 'assistant');
    },
    playAudio,
    addMessage,
  });

  indicator.addEventListener('click', () => alwaysOn.toggle());

  if (window.emberBridge?.onAlwaysOnToggle) {
    window.emberBridge.onAlwaysOnToggle((listening) => {
      if (listening && !alwaysOn.enabled) alwaysOn.start();
      else if (!listening && alwaysOn.enabled) alwaysOn.stop();
    });
  }
}

async function maybeStartAlwaysOn() {
  const granted = await checkAndShowConsent();
  if (granted) {
    initAlwaysOn();
    alwaysOn.start();
  } else {
    initAlwaysOn();
  }
}
